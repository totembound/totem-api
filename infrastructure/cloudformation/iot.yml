AWSTemplateFormatVersion: '2010-09-09'
Description: >
  TotemBound IoT Core - Real-time push notifications via MQTT/WebSocket.
  Server publishes to per-user topics; browser subscribes via Cognito Identity Pool credentials.
  Used ONLY for server-initiated events (Stripe webhooks, admin broadcasts).

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, prod]
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID (from cognito stack)
  CognitoUserPoolClientId:
    Type: String
    Description: Cognito User Pool Client ID (from cognito stack)
  LambdaExecutionRoleArn:
    Type: String
    Description: Lambda execution role ARN (from core stack) - will be updated with IoT publish permission

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]

Resources:

  # ===========================================================================
  # Cognito Identity Pool - Federates with User Pool for IoT credentials
  # ===========================================================================
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub 'totembound-${Environment}-identity'
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref CognitoUserPoolClientId
          ProviderName: !Sub 'cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}'

  # ===========================================================================
  # IAM Roles for Identity Pool
  # ===========================================================================

  # Authenticated users can connect and subscribe to their own topic
  AuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'totembound-${Environment}-iot-auth-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                'cognito-identity.amazonaws.com:aud': !Ref IdentityPool
              ForAnyValue:StringLike:
                'cognito-identity.amazonaws.com:amr': authenticated
      Policies:
        - PolicyName: IoTSubscribePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Connect to IoT Core with identity-scoped client ID
              - Effect: Allow
                Action: iot:Connect
                Resource: !Sub 'arn:aws:iot:${AWS::Region}:${AWS::AccountId}:client/${!cognito-identity.amazonaws.com:sub}-*'
              # Subscribe to own user topic only
              - Effect: Allow
                Action: iot:Subscribe
                Resource: !Sub 'arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/user/${!cognito-identity.amazonaws.com:sub}/*'
              # Subscribe to global broadcast topic
              - Effect: Allow
                Action: iot:Subscribe
                Resource: !Sub 'arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/global/*'
              # Receive messages from own topic
              - Effect: Allow
                Action: iot:Receive
                Resource: !Sub 'arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/user/${!cognito-identity.amazonaws.com:sub}/*'
              # Receive messages from global broadcast topic
              - Effect: Allow
                Action: iot:Receive
                Resource: !Sub 'arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/global/*'

  # Unauthenticated role (required but has no permissions)
  UnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'totembound-${Environment}-iot-unauth-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                'cognito-identity.amazonaws.com:aud': !Ref IdentityPool
              ForAnyValue:StringLike:
                'cognito-identity.amazonaws.com:amr': unauthenticated
      Policies:
        - PolicyName: DenyAll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: '*'
                Resource: '*'

  # Attach roles to Identity Pool
  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        authenticated: !GetAtt AuthenticatedRole.Arn
        unauthenticated: !GetAtt UnauthenticatedRole.Arn

  # ===========================================================================
  # IoT Policy for browser clients (attached via Cognito Identity)
  # ===========================================================================
  IoTBrowserPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: !Sub 'totembound-${Environment}-browser-iot-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: '*'
          - Effect: Allow
            Action:
              - iot:Subscribe
              - iot:Receive
            Resource: '*'

  # ===========================================================================
  # Lambda IoT Publish Policy (added to existing Lambda execution role)
  # ===========================================================================
  LambdaIoTPublishPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub 'totembound-${Environment}-lambda-iot-publish'
      Roles:
        - !Select [1, !Split ['/', !Select [5, !Split [':', !Ref LambdaExecutionRoleArn]]]]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: iot:Publish
            Resource:
              - !Sub 'arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/user/*'
              - !Sub 'arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/global/*'
          - Effect: Allow
            Action: iot:DescribeEndpoint
            Resource: '*'
          - Effect: Allow
            Action: iot:AttachPolicy
            Resource: '*'

Outputs:
  IdentityPoolId:
    Description: Cognito Identity Pool ID for browser IoT authentication
    Value: !Ref IdentityPool
    Export:
      Name: !Sub '${AWS::StackName}-IdentityPoolId'

  AuthenticatedRoleArn:
    Description: IAM Role ARN for authenticated IoT users
    Value: !GetAtt AuthenticatedRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AuthenticatedRoleArn'

  IoTBrowserPolicyName:
    Description: IoT Policy name for browser clients
    Value: !Ref IoTBrowserPolicy
    Export:
      Name: !Sub '${AWS::StackName}-IoTBrowserPolicyName'
