  # ============================================
  # Protected Auth Proxy - catches /v1/auth/me
  # and any future auth sub-routes needing auth
  #
  # API Gateway won't backtrack from /v1/auth/ to
  # /v1/{proxy+}, so we need {proxy+} here too.
  # ============================================
  AuthProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TotemBoundApi
      ParentId: !Ref AuthResource
      PathPart: '{proxy+}'

  AuthProxyAny:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TotemBoundApi
      ResourceId: !Ref AuthProxyResource
      HttpMethod: ANY
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      RequestParameters:
        method.request.path.proxy: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiLambdaFunction.Arn}/invocations"

  AuthProxyOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TotemBoundApi
      ResourceId: !Ref AuthProxyResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      RequestParameters:
        method.request.path.proxy: true
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,Cache-Control'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,PATCH,OPTIONS'"
              method.response.header.Access-Control-Max-Age: "'86400'"
            ResponseTemplates:
              # Echo the request Origin into Access-Control-Allow-Origin only when
              # it's in the env allowlist (app + admin). responseOverride runs at
              # the gateway — no Lambda invocation for preflight.
              application/json: !Sub
                - |
                  #set($origin = $input.params('Origin'))
                  #set($allow = ",${AllowedOrigins},")
                  #if($origin != "" && $allow.indexOf(",$origin,") >= 0)#set($context.responseOverride.header.Access-Control-Allow-Origin = $origin)#end
                - AllowedOrigins: !FindInMap [EnvironmentMap, !Ref Environment, CorsAllowedOrigins]
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: !Ref EmptyModel
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Max-Age: true

