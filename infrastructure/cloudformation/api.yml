  # ============================================
  # API Deployment & Stage
  # Stage name: "api" (not "v1") because resource
  # paths already include /v1/. With custom domain
  # base path mapping, the stage name is hidden.
  # ============================================
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - HealthGet
      - HealthOptions
      - AuthSignupPost
      - AuthSignupOptions
      - AuthLoginPost
      - AuthLoginOptions
      - AuthRefreshPost
      - AuthRefreshOptions
      - AuthLogoutPost
      - AuthLogoutOptions
      - AuthVerifyPost
      - AuthVerifyOptions
      - AuthResendVerificationPost
      - AuthResendVerificationOptions
      - AuthForgotPasswordPost
      - AuthForgotPasswordOptions
      - AuthResetPasswordPost
      - AuthResetPasswordOptions
      - AuthProxyAny
      - AuthProxyOptions
      - V1ProxyAny
      - V1ProxyOptions
      - WebhooksStripePost
      - WebhooksStripeOptions
    Properties:
      RestApiId: !Ref TotemBoundApi
      Description: !Sub "Deployment ${AppVersion} (${Environment})"

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref TotemBoundApi
      DeploymentId: !Ref ApiDeployment
      StageName: api
      Description: !Sub
        - "${Prefix} API Stage"
        - Prefix: !FindInMap [EnvironmentMap, !Ref Environment, ResourcePrefix]
      Variables:
        lambdaVersion: !Ref AppVersion
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          LoggingLevel: ERROR
          ThrottlingBurstLimit: 500
          ThrottlingRateLimit: 200

  # ============================================
  # Lambda Permission for API Gateway
  # ============================================
  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiLambdaFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TotemBoundApi}/*"

Outputs:
  ApiUrl:
    Description: API Gateway base URL (use custom domain for clean URLs)
    Value: !Sub "https://${TotemBoundApi}.execute-api.${AWS::Region}.amazonaws.com/api"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"

  ApiGatewayId:
    Description: API Gateway REST API ID
    Value: !Ref TotemBoundApi
    Export:
      Name: !Sub "${AWS::StackName}-ApiGatewayId"

  LambdaFunctionName:
    Description: Lambda function name (for CI/CD code updates)
    Value: !Ref ApiLambdaFunction
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionName"

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ApiLambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionArn"
